openapi: 3.0.0
info:
  title: Mini Event Management API
  version: 1.0.0
paths:
  /api/events:
    get:
      [cite_start]summary: List all upcoming events [cite: 72]
      responses:
        '200':
          description: A list of events.
  /api/bookings:
    post:
      [cite_start]summary: Book a ticket [cite: 73]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id: { type: integer }
                event_id: { type: integer }
      responses:
        '201':
          description: Booking successful.